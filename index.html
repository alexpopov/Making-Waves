<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Making Waves</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <span style="flex:1"></span>
      <div id="title-group" class="hidden">
        <button id="btn-close" type="button" title="Close project">&times;</button>
        <span id="project-title" contenteditable="false"></span>
      </div>
      <span style="flex:1"></span>
      <button id="btn-settings" type="button" title="Settings">⚙</button>
    </header>

    <input id="file-input" type="file" accept=".wav,audio/wav" hidden />
    <input id="project-input" type="file" accept=".zip" hidden />

    <section id="start-screen">
      <div id="start-buttons">
        <button id="btn-load-wav" type="button">Load WAV</button>
        <button id="btn-load-project" type="button">Load Project</button>
      </div>
    </section>

    <main id="editor" class="hidden">
      <div id="waveform-container">
        <canvas id="waveform"></canvas>
        <div id="cut-zone"></div>
      </div>

      <div id="action-bar">
        <button id="btn-undo" type="button" title="Undo (Ctrl-Z)">&#x21A9;</button>
        <button id="btn-redo" type="button" title="Redo (Ctrl-Shift-Z)">&#x21AA;</button>
        <span class="action-spacer"></span>
        <button id="btn-nudge-left" type="button" title="Nudge left (←)">&#x25C0;</button>
        <button id="btn-nudge-right" type="button" title="Nudge right (→)">&#x25B6;</button>
        <span class="action-spacer"></span>
        <button id="btn-zoom" type="button" title="Zoom toggle (z)">&#x1F50D;</button>
        <span class="action-spacer"></span>
        <button id="btn-esc" type="button" title="Deselect / Cancel (Esc)">Esc</button>
      </div>

      <div id="transport">
        <button id="btn-play" type="button">Play</button>
        <button id="btn-loop" type="button">Loop</button>
        <button id="btn-stop" type="button">Stop</button>
        <span style="flex:1"></span>
        <button id="btn-save-project" type="button">Save Project</button>
      </div>

      <section id="slice-list">
        <div id="slice-list-header">
          <h2>Slices</h2>
          <button id="btn-save-json" type="button">Save JSON</button>
        </div>
        <ul id="slices"></ul>
      </section>
    </main>

    <div id="drop-zone" class="hidden">Drop WAV file here</div>

    <div id="settings-popover" class="hidden">
      <label>
        Theme
        <select id="theme-select">
          <option value="midnight">Midnight</option>
          <option value="cobalt">Cobalt</option>
        </select>
      </label>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
