<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Making Waves</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <button id="btn-load" type="button">Load WAV</button>
      <input id="file-input" type="file" accept=".wav,audio/wav" hidden />
      <span id="file-name"></span>
      <span style="flex:1"></span>
      <button id="btn-settings" type="button">Settings</button>
    </header>

    <main id="editor" class="hidden">
      <div id="waveform-container">
        <canvas id="waveform"></canvas>
      </div>

      <div id="transport">
        <button id="btn-play" type="button">Play</button>
        <button id="btn-loop" type="button">Loop</button>
        <button id="btn-stop" type="button">Stop</button>
        <span style="flex:1"></span>
        <button id="btn-save-project" type="button">Save Project</button>
      </div>

      <section id="slice-list">
        <div id="slice-list-header">
          <h2>Slices</h2>
          <button id="btn-save-json" type="button">Save JSON</button>
        </div>
        <ul id="slices"></ul>
      </section>
    </main>

    <div id="drop-zone" class="hidden">Drop WAV file here</div>

    <div id="settings-popover" class="hidden">
      <label>
        Theme
        <select id="theme-select">
          <option value="midnight">Midnight</option>
          <option value="cobalt">Cobalt</option>
        </select>
      </label>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
